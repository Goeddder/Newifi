<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой инвентарь NFT</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        .header {
            background: #2AABEE;
            color: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .nft-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .nft-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .nft-card img {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            background: #eee;
        }
        .nft-info {
            flex: 1;
        }
        .nft-info h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
        }
        .nft-info p {
            margin: 0 0 8px 0;
            font-size: 13px;
            color: #65676b;
        }
        .send-btn {
            background: #2AABEE;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .send-btn:hover {
            background: #229ED9;
        }
        .empty {
            text-align: center;
            color: #65676b;
            padding: 40px 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎁 Мой инвентарь</h1>
            <p>Твои NFT подарки</p>
        </div>
        <div id="inventory" class="nft-grid">
            <div class="empty">Загрузка...</div>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const initData = tg.initData;

        // Загружаем инвентарь
        fetch('/api/user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ initData })
        })
        .then(res => res.json())
        .then(data => {
            const inventoryDiv = document.getElementById('inventory');
            if (data.nfts && data.nfts.length > 0) {
                let html = '';
                data.nfts.forEach(nft => {
                    html += `
                        <div class="nft-card" data-id="${nft.nftId}">
                            <img src="${nft.imageUrl || 'https://via.placeholder.com/80'}" alt="${nft.title}">
                            <div class="nft-info">
                                <h3>${nft.title}</h3>
                                <p>${nft.description.substring(0, 50)}...</p>
                                <button class="send-btn" onclick="sendNFT('${nft.nftId}')">Отправить админу</button>
                            </div>
                        </div>
                    `;
                });
                inventoryDiv.innerHTML = html;
            } else {
                inventoryDiv.innerHTML = '<div class="empty">У тебя пока нет NFT</div>';
            }
        })
        .catch(err => {
            console.error(err);
            document.getElementById('inventory').innerHTML = '<div class="empty">Ошибка загрузки</div>';
        });

        // Функция отправки NFT (меняет статус)
        window.sendNFT = function(nftId) {
            fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nftId, initData })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    tg.showAlert('NFT отправлен! Ожидай обмена.');
                    // Убираем карточку из интерфейса
                    const card = document.querySelector(`[data-id="${nftId}"]`);
                    if (card) card.remove();
                } else {
                    tg.showAlert('Ошибка: ' + (data.error || 'неизвестная'));
                }
            })
            .catch(err => {
                tg.showAlert('Ошибка соединения');
            });
        };
    </script>
</body>
</html>
